# ─── Nginx Production Config — 10:30 AM Shop ─────────────────────────────────
# Монтируется в docker-compose.prod.yml:
#   ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
#
# Задачи:
#   1. Отдавать статику Vue.js из /usr/share/nginx/html (собранный dist/)
#   2. Проксировать все /api/* запросы на backend:3001
#   3. SPA fallback — любой маршрут кроме /api → index.html

server {
    listen 80;
    server_name _;

    # Корень — собранная статика Vite (из Docker stage "nginx")
    root /usr/share/nginx/html;
    index index.html;

    # Скрыть версию nginx в заголовках
    server_tokens off;

    # ─── API → Backend ────────────────────────────────────────────────────────
    # Все запросы /api/* проксируются на backend-контейнер
    # Имя сервиса "backend" резолвится через Docker internal DNS
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ─── SPA Fallback ─────────────────────────────────────────────────────────
    # Vue Router работает в history mode: /catalog, /admin и т.д. не файлы,
    # а маршруты SPA — nginx возвращает index.html, Vue Router берёт управление
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Кешируемые ассеты ────────────────────────────────────────────────────
    # Vite добавляет хэш в имена файлов (app.abc123.js) — можно кешировать долго
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
