# ─── Docker Compose PRODUCTION — 10:30 AM Shop ───────────────────────────────
# ВА-2: Production-конфиг для деплоя на Timeweb VPS.
#
# Отличия от docker-compose.yml (dev):
#   - Нет монтирования кода (./backend:/app, ./frontend:/app) — код внутри образа
#   - Нет nodemon — backend запускается через node server.js
#   - Frontend — статика собрана Vite и отдаётся Nginx
#   - Nginx — reverse proxy: статика + /api/* → backend
#
# Запуск на сервере:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Требует на сервере: backend/.env.prod (скопировать из .env.example и заполнить)

name: 1030shop

services:

  # ─── Backend: Node.js + Express + SQLite (production) ─────────────────────
  backend:
    container_name: 1030shop-backend
    build:
      context: ./backend
      # Multi-stage build: копирует только prod-зависимости (без nodemon)
      target: production
    # Нет монтирования кода — используется то что внутри образа (COPY . .)
    volumes:
      # Только данные SQLite — персистентное хранилище
      - 1030shop-db:/app/db
    env_file:
      - ./backend/.env.prod
    restart: unless-stopped
    # Backend не открыт наружу — доступ только через nginx внутри сети
    expose:
      - "3001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Nginx: статика + reverse proxy ───────────────────────────────────────
  nginx:
    container_name: 1030shop-nginx
    build:
      context: ./frontend
      # Multi-stage: Vite build → nginx образ со статикой dist/
      target: nginx
    ports:
      - "80:80"
      # SSL настраивается через certbot на хост-машине, сертификаты монтируются
      # - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # Раскомментировать после получения SSL сертификата:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  1030shop-db:
    name: 1030shop-db
